# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Bhumika Mittal
first_name: Bhumika
middle_name:
last_name: Mittal
email: bhumikamittal@gatech.edu
description: >
  Bhumika's academic homepage.
footer_text:
keywords: bhumika, bhumika mittal, mittalbhumika7, bhumikamittal, bmittal

lang: en
icon: ⚛️

url: https://bhumikamittal.in/
baseurl:
last_updated: false

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username: bhumikamittal7
twitter_username: mittalbhumika7
linkedin_username: mittalbhumika7
scholar_userid: erLD5B0AAAAJ

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ['_pages']
exclude:
  - bin
  - Gemfile
  - Gemfile.lock
  - vendor
keep_files:
  - CNAME
  - .nojekyll
  - .git

plugins:
  - jekyll-feed
  - jekyll-minifier
  - jekyll/scholar
  - jekyll-sitemap

defaults:
  - scope:
      path: "assets/**/*.*"
    values:
      sitemap: false

jekyll-minifier:
  exclude: ['robots.txt']

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:
  last_name: [Mittal]
  first_name: [Bhumika]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]
  replace_strings: true
  join_strings: true
  query: "@*"

filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website, preview, altmetric]
max_author_limit: 3
more_authors_animation_delay: 10

# -----------------------------------------------------------------------------
# Features
# -----------------------------------------------------------------------------

enable_math: true
enable_darkmode: true
